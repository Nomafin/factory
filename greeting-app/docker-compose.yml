services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FACTORY_SERVICE_PORT:-3000}"
    labels:
      - "factory.task-id=${FACTORY_TASK_ID:-52}"
      - "factory.repo=${FACTORY_REPO:-factory}"
      - "factory.env-type=test"
      - "factory.created=${FACTORY_CREATED:-0}"
      - "traefik.enable=true"
      # Web entrypoint (nginx → Traefik HTTP)
      - "traefik.http.routers.task-${FACTORY_TASK_ID:-52}.rule=Host(`${FACTORY_HOSTNAME:-task-52.preview.factory.6a.fi}`)"
      - "traefik.http.routers.task-${FACTORY_TASK_ID:-52}.entrypoints=web"
      # Websecure entrypoint (direct HTTPS)
      - "traefik.http.routers.task-${FACTORY_TASK_ID:-52}-secure.rule=Host(`${FACTORY_HOSTNAME:-task-52.preview.factory.6a.fi}`)"
      - "traefik.http.routers.task-${FACTORY_TASK_ID:-52}-secure.entrypoints=websecure"
      - "traefik.http.routers.task-${FACTORY_TASK_ID:-52}-secure.tls=true"
      - "traefik.http.services.task-${FACTORY_TASK_ID:-52}.loadbalancer.server.port=${FACTORY_SERVICE_PORT:-3000}"
    environment:
      - PORT=${FACTORY_SERVICE_PORT:-3000}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${FACTORY_SERVICE_PORT:-3000}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default
      - factory-preview

networks:
  factory-preview:
    external: true
