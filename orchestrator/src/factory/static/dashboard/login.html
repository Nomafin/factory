<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Factory Dashboard</title>
<link rel="stylesheet" href="/static/dashboard/styles.css">
<style>
  body { overflow: auto; }
  .login-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    max-width: 420px;
    width: 100%;
    margin: 20px;
  }
  .login-logo {
    font-size: 48px;
    margin-bottom: 8px;
  }
  .login-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .login-subtitle {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 32px;
    line-height: 1.5;
  }
  .login-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--accent);
    color: #fff;
    padding: 14px 32px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    width: 100%;
  }
  .login-btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }
  .login-btn svg {
    width: 20px;
    height: 20px;
  }
  .login-error {
    background: var(--red-dim);
    color: var(--red);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }
  .login-footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-logo">&#x2699;</div>
    <h1 class="login-title">Factory Dashboard</h1>
    <p class="login-subtitle">Sign in with your Plane account to access the agent orchestration dashboard.</p>

    <div class="login-error" id="loginError"></div>

    <a href="/auth/login" class="login-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Login with Plane
    </a>

    <div class="login-footer">
      Powered by Plane OAuth
    </div>
  </div>
</div>

<script>
(function() {
  // Check for auth errors in URL
  var params = new URLSearchParams(window.location.search);
  var error = params.get('auth_error');
  if (error) {
    var el = document.getElementById('loginError');
    var messages = {
      'token_exchange_failed': 'Authentication failed. Please try again.',
      'token_exchange_error': 'Could not connect to authentication server.',
      'access_denied': 'Access was denied. Please contact your administrator.',
    };
    el.textContent = messages[error] || 'Authentication error: ' + error;
    el.style.display = 'block';
  }
})();
</script>
</body>
</html>
